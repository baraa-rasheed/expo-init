# fly.toml app configuration file generated for expo-init on 2026-04-26T07:15:31Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'expo-init'
primary_region = 'dfw'

[build]
  dockerfile = "Dockerfile"

[http_service]
  # react-router-serve respects PORT. Our Dockerfile sets PORT=3000.
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[env]
  NODE_ENV = "production"
  PORT = "3000"
  # Give Node a bit more headroom on small machines.
  NODE_OPTIONS = "--max-old-space-size=768"

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
